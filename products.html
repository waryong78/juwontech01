let activeCategory = '전체';

function renderTabs() {
    const container = document.getElementById('filter-tabs');
    container.innerHTML = categories.map(cat => {
        const count = cat.id === '전체'
            ? products.length
            : products.filter(p => p.category === cat.id).length;
        const isActive = cat.id === activeCategory;
        return `
            <button
                onclick="setCategory('${cat.id}')"
                class="px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all duration-200 ${
                    isActive
                        ? 'bg-blue-600 text-white shadow'
                        : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                }"
            >
                ${cat.label} <span class="ml-1 opacity-70">${count}</span>
            </button>
        `;
    }).join('');
}

const preview = document.getElementById('img-preview');
const previewImg = document.getElementById('img-preview-src');
const previewName = document.getElementById('img-preview-name');

function showPreview(imgSrc, name, cardEl) {
    previewImg.src = imgSrc;
    previewName.textContent = name;
    preview.classList.remove('hidden');

    const rect = cardEl.closest('.group').getBoundingClientRect();
    const pw = 336;
    const ph = 340;
    const pad = 12;

    let x = rect.right + pad;
    if (x + pw > window.innerWidth) x = rect.left - pw - pad;

    let y = rect.top + (rect.height / 2) - (ph / 2);
    if (y < pad) y = pad;
    if (y + ph > window.innerHeight - pad) y = window.innerHeight - ph - pad;

    preview.style.left = x + 'px';
    preview.style.top  = y + 'px';
}

function hidePreview() {
    preview.classList.add('hidden');
}

function renderProducts() {
    const filtered = activeCategory === '전체'
        ? products
        : products.filter(p => p.category === activeCategory);

    document.getElementById('product-count').textContent = `총 ${filtered.length}개 제품`;

    document.getElementById('product-grid').innerHTML = filtered.map(p => `
        <div class="group border rounded-2xl overflow-hidden hover:border-blue-500 transition-all duration-300 shadow-sm hover:shadow-xl bg-white">
            <div class="bg-slate-100 h-52 flex items-center justify-center p-6 cursor-zoom-in"
                data-img="${p.image}" data-name="${p.name}">
                <img
                    src="${p.image}"
                    alt="${p.name}"
                    class="max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-300"
                    onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect width=%22100%22 height=%22100%22 fill=%22%23e2e8f0%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22 font-size=%2212%22>No Image</text></svg>'"
                >
            </div>
            <div class="p-4">
                <span class="text-blue-600 text-xs font-bold">${p.category}</span>
                <h3 class="text-sm font-bold mt-1 text-slate-800">${p.name}</h3>
                <a href="index.html#contact" class="mt-3 block text-center text-xs font-bold text-blue-600 border border-blue-200 rounded-lg py-1.5 hover:bg-blue-50 transition">
                    문의하기
                </a>
            </div>
        </div>
    `).join('');

    document.querySelectorAll('#product-grid [data-img]').forEach(el => {
        el.addEventListener('mouseenter', () => showPreview(el.dataset.img, el.dataset.name, el));
        el.addEventListener('mouseleave', hidePreview);
    });
}

function setCategory(categoryId) {
    activeCategory = categoryId;
    renderTabs();
    renderProducts();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderTabs();
renderProducts();
